apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: plc-waveform-trigger-template
spec:
  params:
    - name: git-url
    - name: git-revision
      default: main

  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: plc-waveform-run-
        labels:
          tekton.dev/pipeline: plc-waveform-pipeline
      spec:
        pipelineRef:
          name: plc-waveform-pipeline
        taskRunTemplate:
          serviceAccountName: pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-name
            # plc-waveform を実際の namespace に置き換える
            value: image-registry.openshift-image-registry.svc:5000/plc-waveform/plc-waveform
          - name: image-tag
            value: $(tt.params.git-revision)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 500Mi
          - name: docker-credentials
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 10Mi
