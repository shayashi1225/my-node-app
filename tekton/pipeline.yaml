apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: plc-waveform-pipeline
spec:
  params:
    - name: git-url
      type: string
      description: Git リポジトリ URL
    - name: git-revision
      type: string
      default: main
      description: ビルド対象のブランチ/コミット
    - name: image-name
      type: string
      description: "ビルドするコンテナイメージ名 (例: image-registry.openshift-image-registry.svc:5000/plc-waveform/plc-waveform)"
    - name: image-tag
      type: string
      default: latest

  workspaces:
    - name: source
    - name: docker-credentials

  tasks:
    # ── 1. ソースコード取得 ──────────────────────────────────────────────
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: source
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: ""

    # ── 1.5. クローン結果確認（デバッグ用） ─────────────────────────────
    - name: debug-ls
      runAfter:
        - clone
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: ls
            image: registry.access.redhat.com/ubi9/nodejs-20:latest
            script: |
              #!/usr/bin/env bash
              echo "=== workspace root ==="
              ls -la $(workspaces.source.path)/
              echo "=== Dockerfile check ==="
              test -f $(workspaces.source.path)/Dockerfile && echo "Dockerfile: FOUND" || echo "Dockerfile: NOT FOUND"
      workspaces:
        - name: source
          workspace: source

    # ── 2. テスト実行 ────────────────────────────────────────────────────
    - name: test
      runAfter:
        - debug-ls
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: npm-test
            image: registry.access.redhat.com/ubi9/nodejs-20:latest
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env bash
              set -e
              npm ci
              npm test
      workspaces:
        - name: source
          workspace: source

    # ── 3. コンテナイメージビルド & Push ────────────────────────────────
    - name: build-push
      runAfter:
        - test
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: docker-credentials
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.image-tag)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: .
        - name: FORMAT
          value: oci
        - name: BUILD_EXTRA_ARGS
          value: "--label git-revision=$(params.git-revision)"

    # ── 4. OpenShift へデプロイ ──────────────────────────────────────────
    - name: deploy
      runAfter:
        - build-push
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: manifest-dir
          workspace: source
      params:
        - name: SCRIPT
          value: |
            set -e
            # マニフェスト適用（PVC/ConfigMap/Service/Route は初回のみ変更あり）
            oc apply -f deploy/pvc.yaml
            oc apply -f deploy/configmap.yaml
            oc apply -f deploy/service.yaml
            oc apply -f deploy/route.yaml

            # Deployment のイメージタグを更新して apply
            sed "s|image-registry.openshift-image-registry.svc:5000/plc-waveform/plc-waveform:latest|$(params.image-name):$(params.image-tag)|g" \
              deploy/deployment.yaml | oc apply -f -

            # ロールアウト完了を待機
            oc rollout status deployment/plc-waveform --timeout=3m
