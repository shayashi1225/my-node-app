<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; gap: 20px; padding: 16px; font-family: sans-serif; background: #f5f5f5; }

    .plc-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .plc-row h2 {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .plc-row.plc1 h2 { background: #c53030; }
    .plc-row.plc2 h2 { background: #2b6cb0; }

    .events-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .events-panel h3 { font-size: 13px; color: #333; }
    .events-panel h3 span { font-weight: bold; }
    .plc1 .events-panel h3 span { color: #c53030; }
    .plc2 .events-panel h3 span { color: #2b6cb0; }

    .search-form {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-form input {
      width: 74px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .search-form label { font-size: 12px; color: #555; }
    .search-form button {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-search { background: #3182ce; color: #fff; }
    .btn-reset  { background: #e2e8f0; color: #333; }

    .events-list {
      flex: 1;
      overflow-y: auto;
      max-height: 280px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .event-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 10px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .event-row:last-child { border-bottom: none; }
    .event-row .time { color: #666; }
    .plc1 .event-row .val { font-weight: bold; color: #c53030; }
    .plc2 .event-row .val { font-weight: bold; color: #2b6cb0; }
    .event-empty { padding: 14px; text-align: center; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

  <!-- PLC1 -->
  <div class="plc-row plc1">
    <div>
      <h2>PLC 1</h2>
      <div id="chart-plc1"></div>
    </div>
    <div class="events-panel">
      <h3>閾値超過イベント (&gt; <span id="threshold-plc1">…</span>)</h3>
      <div class="search-form" id="search-plc1">
        <label>最小値 <input type="number" class="min-val" placeholder="例: 70"></label>
        <label>最大値 <input type="number" class="max-val" placeholder="例: 90"></label>
        <button class="btn-search">検索</button>
        <button class="btn-reset">リセット</button>
      </div>
      <div class="events-list" id="list-plc1"><p class="event-empty">読み込み中…</p></div>
    </div>
  </div>

  <!-- PLC2 -->
  <div class="plc-row plc2">
    <div>
      <h2>PLC 2</h2>
      <div id="chart-plc2"></div>
    </div>
    <div class="events-panel">
      <h3>閾値超過イベント (&gt; <span id="threshold-plc2">…</span>)</h3>
      <div class="search-form" id="search-plc2">
        <label>最小値 <input type="number" class="min-val" placeholder="例: 70"></label>
        <label>最大値 <input type="number" class="max-val" placeholder="例: 90"></label>
        <button class="btn-search">検索</button>
        <button class="btn-reset">リセット</button>
      </div>
      <div class="events-list" id="list-plc2"><p class="event-empty">読み込み中…</p></div>
    </div>
  </div>

  <script>
    const MAX_POINTS = 500;

    function makeChartData() {
      return [new Array(MAX_POINTS).fill(null), new Array(MAX_POINTS).fill(null)];
    }

    function makeChart(containerId, title, color) {
      const data = makeChartData();
      const opts = {
        title,
        width: 740,
        height: 300,
        scales: { x: { time: true } },
        series: [{}, { stroke: color, label: "Voltage" }],
      };
      const u = new uPlot(opts, data, document.getElementById(containerId));
      return { u, data };
    }

    const plc1 = makeChart('chart-plc1', 'PLC1 Waveform (100ms)', '#c53030');
    const plc2 = makeChart('chart-plc2', 'PLC2 Waveform (100ms)', '#2b6cb0');

    // --- イベントリスト共通ヘルパー ---
    function fmt(ts) {
      return new Date(ts).toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderList(listEl, events) {
      if (events.length === 0) {
        listEl.innerHTML = '<p class="event-empty">該当データなし</p>';
        return;
      }
      listEl.innerHTML = events.map(e =>
        `<div class="event-row">
           <span class="time">${fmt(e.ts)}</span>
           <span class="val">${e.value.toFixed(2)}</span>
         </div>`
      ).join('');
    }

    async function loadEvents(plcId, params = {}) {
      const qs = new URLSearchParams({ plcId });
      if (params.minValue != null) qs.set('minValue', params.minValue);
      if (params.maxValue != null) qs.set('maxValue', params.maxValue);
      const res = await fetch('/api/events?' + qs);
      return res.json();
    }

    function setupSearchForm(formId, listId, plcId) {
      const form    = document.getElementById(formId);
      const listEl  = document.getElementById(listId);
      const minInput = form.querySelector('.min-val');
      const maxInput = form.querySelector('.max-val');

      form.querySelector('.btn-search').addEventListener('click', async () => {
        const min = minInput.value;
        const max = maxInput.value;
        renderList(listEl, await loadEvents(plcId, {
          minValue: min !== '' ? Number(min) : undefined,
          maxValue: max !== '' ? Number(max) : undefined,
        }));
      });

      form.querySelector('.btn-reset').addEventListener('click', async () => {
        minInput.value = '';
        maxInput.value = '';
        renderList(listEl, await loadEvents(plcId));
      });

      return listEl;
    }

    const list1 = setupSearchForm('search-plc1', 'list-plc1', 1);
    const list2 = setupSearchForm('search-plc2', 'list-plc2', 2);

    // --- 初期ロード ---
    (async () => {
      const [events1, events2, { plc1: th1, plc2: th2 }] = await Promise.all([
        loadEvents(1),
        loadEvents(2),
        fetch('/api/thresholds').then(r => r.json()),
      ]);
      document.getElementById('threshold-plc1').textContent = th1;
      document.getElementById('threshold-plc2').textContent = th2;
      renderList(list1, events1);
      renderList(list2, events2);
    })();

    // --- Socket.IO ---
    const socket = io();
    socket.on('waveform-data', (payload) => {
      const target = payload.plcId === 2 ? plc2 : plc1;
      target.data[0].shift(); target.data[0].push(payload.ts / 1000);
      target.data[1].shift(); target.data[1].push(payload.value);
      target.u.setData(target.data);
    });
  </script>
</body>
</html>
