apiVersion: apps/v1
kind: Deployment
metadata:
  name: plc-waveform
  labels:
    app: plc-waveform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plc-waveform
  template:
    metadata:
      labels:
        app: plc-waveform
    spec:
      containers:
        - name: plc-waveform
          # Tekton パイプラインがビルド後に IMAGE タグを書き換える
          image: image-registry.openshift-image-registry.svc:5000/plc-waveform/plc-waveform:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plc-waveform-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plc-waveform-data
